spring.application.name=server

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

server.port=8080
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.backend-url=${BACKEND_URL:http://localhost:8080}
app.oauth-success-url=${OAUTH_SUCCESS_URL:${app.frontend-url}/dashboard}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/gigshield}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:appuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:apppass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false
spring.session.store-type=redis
spring.session.redis.namespace=gigshield:sessions
spring.session.timeout=7d

server.servlet.session.cookie.name=GIGSHIELD_SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
