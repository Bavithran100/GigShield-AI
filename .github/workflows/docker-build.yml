name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build frontend image
      run: |
        docker build -t bavithran777/docker-fullstack-frontend ./Client

    - name: Push frontend image
      run: |
        docker push bavithran777/docker-fullstack-frontend

    - name: Build backend image
      run: |
        docker build -t bavithran777/docker-fullstack-backend ./server

    - name: Push backend image
      run: |
        docker push bavithran777/docker-fullstack-backend